# Reverse proxy: publish the game on http://localhost (port 80) and forward to
# the Go server, with WebSocket upgrade support for the live game socket.
# Mounted at /etc/nginx/conf.d/default.conf (included inside nginx's http block).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen      80;
    server_name localhost;

    location / {
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        # Keep long-lived WebSocket connections open.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
