services:
  app:
    build: .
    expose:
      - "8080" # internal only; nginx reaches it over the compose network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80" # publish the site on http://localhost
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
